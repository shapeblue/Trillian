---
# Playwright VM Setup Playbook
# This playbook configures a Playwright VM for UI testing
# Usage: ansible-playbook deploy_playwright.yml -i hosts_<env_name>

- hosts: playwright_host
  gather_facts: no
  vars:
    num_pw_hosts: "{{ groups['playwright_host'] | default([]) | length }}"
    ssh_retries: 1000
    env_timezone: "UTC"
    use_hipchat: false
    use_slack: false
  roles:
    - { role: timezone, when: num_pw_hosts | int != 0 }
    - { role: cloudmonkey, when: num_pw_hosts | int != 0 }
    - { role: hipchat_client, when: (num_pw_hosts | int != 0) and (use_hipchat) }
    - { role: slack_client, when: (num_pw_hosts | int != 0) and (use_slack) }
    - { role: playwright, when: num_pw_hosts | int != 0 }

- hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Schedule Playwright tests
      at:
        command: "cd {{ local_dir_path }}/Ansible && ansible-playbook -i {{ inventory_file }} run-playwright-tests.yml"
        count: 1
        units: minutes
      when: 
        - groups['playwright_host'] is defined
        - groups['playwright_host'] | length > 0
        - run_playwright_tests is defined
        - run_playwright_tests | bool
