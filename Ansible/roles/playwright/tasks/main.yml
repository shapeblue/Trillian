---
# Playwright role - main tasks (Direct execution, no Docker)

- name: Wait for SSH
  local_action: wait_for port=22 host="{{ ansible_ssh_host }}" timeout={{ ssh_retries }} connect_timeout=5
  tags:
    - playwright

- name: Detect OS family
  raw: "test -f /etc/redhat-release && echo 'RedHat' || echo 'Debian'"
  register: os_detection
  changed_when: false
  tags:
    - playwright

- name: Set OS family fact
  set_fact:
    ansible_os_family: "{{ os_detection.stdout | trim }}"
  tags:
    - playwright

- name: Update apt cache
  apt:
    update_cache: yes
  when: ansible_os_family == 'Debian'
  tags:
    - playwright

- name: Install development tools and prerequisites (Debian)
  apt:
    name:
      - build-essential
      - ca-certificates
      - curl
      - git
      - jq
      - npm
      - nodejs
      - screen
      - tmux
      - vim
      - wget
    state: present
  when: ansible_os_family == 'Debian'
  register: debian_packages
  tags:
    - playwright

- name: Install development tools and prerequisites (RedHat/CentOS)
  dnf:
    name:
      - gcc
      - gcc-c++
      - make
      - ca-certificates
      - curl
      - git
      - jq
      - npm
      - nodejs
      - screen
      - tmux
      - vim
      - wget
    state: present
  when: ansible_os_family == 'RedHat'
  register: redhat_packages
  tags:
    - playwright

- name: Wait for SSH after package updates (SSH may restart)
  local_action: wait_for port=22 host="{{ ansible_ssh_host }}" delay=5 timeout=60
  when: (redhat_packages.changed | default(false)) or (debian_packages.changed | default(false))
  tags:
    - playwright

- name: Create playwright directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  with_items:
    - /playwright
    - /playwright/tests
    - /playwright/results
    - /playwright/logs
    - /playwright/tools
  tags:
    - playwright

- name: Copy result parser script
  copy:
    src: tools/parse-results.sh
    dest: /playwright/tools/parse-results.sh
    mode: '0755'
  tags:
    - playwright

- name: Create .ssh directory for root
  file:
    path: /root/.ssh
    state: directory
    mode: '0700'
  tags:
    - playwright

- name: Deploy GitHub deploy key for test repository
  copy:
    src: github_deploy_key
    dest: /root/.ssh/id_rsa_playwright
    mode: '0600'
  ignore_errors: yes
  register: deploy_key_result
  tags:
    - playwright

- name: Configure SSH to use deploy key for GitHub
  blockinfile:
    path: /root/.ssh/config
    create: yes
    mode: '0600'
    block: |
      Host github.com
        HostName github.com
        IdentityFile /root/.ssh/id_rsa_playwright
        StrictHostKeyChecking no
        UserKnownHostsFile /dev/null
  when: deploy_key_result is succeeded
  tags:
    - playwright

- name: Clone Playwright tests repo
  git:
    repo: "{{ playwright_tests_repo | default(def_playwright_tests_repo) }}"
    dest: /playwright/tests
    version: "{{ playwright_tests_branch | default(def_playwright_tests_branch) }}"
    update: yes
    accept_hostkey: yes
  when: (playwright_tests_repo is defined) and (deploy_key_result is succeeded)
  tags:
    - playwright

- name: Install Playwright dependencies (npm ci)
  shell: cd /playwright/tests && npm ci
  tags:
    - playwright

- name: Install Playwright browsers with system dependencies
  shell: cd /playwright/tests && npx playwright install --with-deps chromium
  tags:
    - playwright
  register: playwright_install
  ignore_errors: yes

- name: Install browser system dependencies (Debian fallback)
  apt:
    name:
      - libnss3
      - libnspr4
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libdrm2
      - libdbus-1-3
      - libxkbcommon0
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxrandr2
      - libgbm1
      - libasound2
      - libatspi2.0-0
      - libxshmfence1
    state: present
  when: ansible_os_family == 'Debian' and playwright_install.failed
  tags:
    - playwright

- name: Retry Playwright browsers installation (if first attempt failed)
  shell: cd /playwright/tests && npx playwright install chromium
  when: playwright_install.failed
  tags:
    - playwright

- name: Copy runtests script
  template:
    src: runtests.sh.j2
    dest: /playwright/runtests.sh
    mode: '0755'
  tags:
    - playwright

- name: Copy upload_to_es script
  copy:
    src: upload_to_es.sh
    dest: /playwright/upload_to_es.sh
    mode: '0755'
  tags:
    - playwright
