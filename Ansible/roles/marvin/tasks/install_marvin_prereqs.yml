- debug: msg="Connecting to Marvin host {{ ansible_ssh_host }}"
  tags:
    - marvin
    - marvin_cfg
    - marvin_install

- name: wait for ssh
  local_action: wait_for port=22 host="{{ ansible_ssh_host }}" timeout={{ ssh_retries }} connect_timeout=5
  tags:
    - marvin
    - marvin_cfg
    - marvin_install

- name: Install newest openssh dependencies
  dnf: name={{ item }} state=installed
  with_items:
  - openssh
  - openssh-askpass
  - openssh-server
  - openssh-clients
  tags:
    - marvin
    - marvin_install

- name: Install Dev Tools Group
  dnf: name="@Development tools" state=installed
  tags:
    - marvin
    - marvin_cfg
    - marvin_install

- name: Install other dependancies
  dnf: name={{ item }} state=installed
  with_items:
  - at
  - bzip2-devel
  - git
  - jq
  - libffi-devel
  - libxslt-devel
  - mariadb
  - ncurses-devel
  - openssl-devel
  - python3-devel
  - python3-pip
  - screen
  - sqlite
  - sqlite-devel
  - sshpass
  - tmux
  - vim
  - wget
  - xz-libs
  - zlib-devel
  tags:
    - marvin
    - marvin_install

- name: remove yum openSSL package
  dnf:
    name: "{{ item }}"
    state: absent
  with_items:
  - python3-pyOpenSSL
  - python3-six
  - python3-urllib3
  - python3-requests

- name: Update pip3 and components
  pip:
    name: "{{ item }}"
    executable: pip3
    extra_args: '--upgrade'
  with_items:
  - pip
  - six
  - pyOpenSSL
  - paramiko
  - wheel==0.45.1
  - kubernetes
  - pyasn1
  - wget
  - texttable
  - lxml
  - pycparser
  - mysql-connector-python==8.0.30
  - netaddr
  - pyvmomi
  tags:
    - marvin
    - marvin_install

- name: Clear all yum cache
  command: dnf clean all

- name: Ensure CA-Certificates are up to date
  dnf:
    name: ca-certificates
    state: latest
  tags:
    - marvin
    - marvin_install

- name: ensure atd is running to schedule jobs
  systemd:
    name: atd
    state: started
    enabled: true

- name: Install Docker dependency packages
  dnf:
    name:
      - dnf-plugins-core
      - device-mapper-persistent-data
      - lvm2
    state: present
  tags:
    - marvin
    - marvin_install

- name: Configure Docker CE repository
  get_url:
    url: https://download.docker.com/linux/centos/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: "0644"
  tags:
    - marvin
    - marvin_install

- name: Install Docker Engine and related components
  dnf:
    name:
      - containerd.io
      - docker-ce
      - docker-ce-cli
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  tags:
    - marvin
    - marvin_install

- name: Ensure Docker service is enabled and running
  systemd:
    name: docker
    enabled: true
    state: started
  tags:
    - marvin
    - marvin_install

- name: Wait for Docker socket
  wait_for:
    path: /var/run/docker.sock
    timeout: 30
  tags:
    - marvin
    - marvin_install

- name: Add marvin user to docker group
  user:
    name: marvin
    groups: docker
    append: true
  tags:
    - marvin
    - marvin_install
