---

- name: remove compiled code/tests
  command: rm -f "{{ item }}"/*.pyc
  with_items:
    - "/marvin/tests/smoke"
    - "/marvin/tests/component"
    - "/usr/lib/python2.7/site-packages/marvin/lib"
  tags:
    - marvin
    - marvin_cfg
    - marvin_fix_tests

- name: copy locally fixed tests
  copy: 
    src: "{{ item }}"
    dest: /usr/lib/python2.7/site-packages/marvin/lib/
    mode: 0755
  with_fileglob:
    - ../files/marvin_lib/*
  tags:
    - marvin
    - marvin_cfg
    - marvin_fix_tests

- name: Remove test_vm_life_cycle.py file as it is not needed to be replaced for CS4.15
  file:
    path: ../files/smoke/test_vm_life_cycle.py
    state: absent
  when: (env_numversion | version_compare('4.15','>='))
  tags:
    - marvin
    - marvin_cfg
    - marvin_fix_tests

- name: Copy files to /marvin/tests/smoke/
  copy:
    src: "{{ item }}"
    dest: /marvin/tests/smoke/
    mode: 0755
  with_fileglob:
    - ../files/smoke/*
  tags:
    - marvin
    - marvin_cfg
    - marvin_fix_tests



